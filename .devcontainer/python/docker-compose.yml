networks:
  dust-mite-observability:
    name: dust-mite-observability

services:
  python:
    build:
      context: ../..
      dockerfile: .devcontainer/python/Dockerfile
      args:
        USER_UID: "${UID:-1050}"
        USER_GID: "${GID:-1050}"
    user: "${UID:-1050}:${GID:-1050}"
    volumes:
      - ../..:/workspaces/dust-mite:cached
    env_file:
      - path: ../../.env
    # Uncomment to pass through PS5 DualSense controller.
    # Run ./controller/scripts/find_dualsense.sh on the host to find the hidraw path.
    # devices:
    #   - /dev/hidraw4:/dev/hidraw4
    ports:
      - "8765:8765"
    command: sleep infinity
    networks:
      - dust-mite-observability
      - default
