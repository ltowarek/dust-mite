networks:
  dust-mite-observability:
    name: dust-mite-observability

services:
  cpp:
    build:
      context: ./car
    env_file:
      - path: .env
    # Uncomment to pass through ESP32 device.
    # devices:
    #   - /dev/ttyACM0:/dev/ttyACM0
    command: sleep infinity
    networks:
      - dust-mite-observability

  python:
    build:
      context: ./controller
      dockerfile: Dockerfile
    env_file:
      - path: .env
    # devices:
    #   - /dev/hidraw4:/dev/hidraw4
    ports:
      - "8765:8765"
    command: sleep infinity
    networks:
      - dust-mite-observability
      - default

  js:
    build:
      context: ./web
      dockerfile: Dockerfile
    env_file:
      - path: .env
    ports:
      - "5173:5173"
    command: sleep infinity
    networks:
      - dust-mite-observability
      - default

  otel-collector:
    extends:
      file: observability/docker-compose.yml
      service: otel-collector

  tempo:
    extends:
      file: observability/docker-compose.yml
      service: tempo

  victoriametrics:
    extends:
      file: observability/docker-compose.yml
      service: victoriametrics

  grafana:
    extends:
      file: observability/docker-compose.yml
      service: grafana

  test-runner:
    build:
      context: .
      dockerfile: .devcontainer/js/Dockerfile
    volumes:
      - .:/workspaces/dust-mite
    working_dir: /workspaces/dust-mite/web
    env_file:
      - path: .env
    environment:
      BASE_URL: http://js:5173
      VITE_WS_URL: ws://python:8765
      PLAYWRIGHT_OUTPUT_DIR: /tmp/playwright-results
    command: sleep infinity
    networks:
      - dust-mite-observability
