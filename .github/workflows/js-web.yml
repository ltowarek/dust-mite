name: JavaScript web

on:
  pull_request:
  push:
    branches:
      - main

jobs:
  build-docker:
    permissions:
      contents: read
      packages: write

    runs-on: ubuntu-latest

    steps:
    - name: Set up Docker Buildx
      uses: docker/setup-buildx-action@v4

    - name: Login to GitHub Container Registry
      uses: docker/login-action@v4
      with:
        registry: ghcr.io
        username: ${{ github.repository_owner }}
        password: ${{ secrets.GITHUB_TOKEN }}

    - name: Build and push
      uses: docker/build-push-action@v7
      with:
        tags: ghcr.io/ltowarek/dust-mite-js-devcontainer
        file: ./.devcontainer/js/Dockerfile
        push: true

  run-checks:
    needs: build-docker
    permissions:
      contents: read

    runs-on: ubuntu-latest

    container:
      image: ghcr.io/ltowarek/dust-mite-js-devcontainer
      options: --user root
      credentials:
        username: ${{ github.repository_owner }}
        password: ${{ secrets.GITHUB_TOKEN }}

    defaults:
      run:
        shell: bash
        working-directory: ./web

    steps:
    - name: Checkout
      uses: actions/checkout@v4

    - name: Install dependencies
      run: npm ci

    - name: Run linters
      run: ./scripts/run_linters.sh
    - name: Run formatter
      run: ./scripts/run_formatter.sh --check
    - name: Run build
      run: ./scripts/run_build.sh
    - name: Run tests
      env:
        HOME: /root
      run: ./scripts/run_tests.sh

    # Non-blocking: coverage artifact is informational only.
    - name: Upload coverage artifact
      uses: actions/upload-artifact@v4
      with:
        name: coverage-js
        path: web/coverage/
        if-no-files-found: warn

  ci-status-js-web:
    needs: [build-docker, run-checks]
    if: always()
    runs-on: ubuntu-latest
    steps:
    - name: Fail if any needed job did not succeed
      if: ${{ contains(needs.*.result, 'failure') || contains(needs.*.result, 'cancelled') || contains(needs.*.result, 'skipped') }}
      run: exit 1
