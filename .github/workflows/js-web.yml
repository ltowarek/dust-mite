name: JavaScript web

on:
  pull_request:
  push:
    branches:
      - main

jobs:
  build-docker:
    permissions:
      contents: read
      packages: write

    runs-on: ubuntu-latest

    steps:
    - name: Set up Docker Buildx
      uses: docker/setup-buildx-action@v3

    - name: Login to GitHub Container Registry
      uses: docker/login-action@v3
      with:
        registry: ghcr.io
        username: ${{ github.repository_owner }}
        password: ${{ secrets.GITHUB_TOKEN }}

    - name: Build and push
      uses: docker/build-push-action@v6
      with:
        tags: ghcr.io/ltowarek/dust-mite-js-devcontainer
        file: ./.devcontainer/js/Dockerfile
        push: true

  run-checks:
    needs: build-docker
    permissions:
      contents: read

    runs-on: ubuntu-latest

    container:
      image: ghcr.io/ltowarek/dust-mite-js-devcontainer
      options: --user root
      env:
        HOME: /root
      credentials:
        username: ${{ github.repository_owner }}
        password: ${{ secrets.GITHUB_TOKEN }}

    defaults:
      run:
        shell: bash
        working-directory: ./web

    steps:
    - name: Checkout
      uses: actions/checkout@v4

    - name: Install dependencies
      run: npm ci

    - name: Run linters
      run: ./scripts/run_linters.sh
    - name: Run formatter
      run: ./scripts/run_formatter.sh --check
    - name: Run build
      run: ./scripts/run_build.sh
    - name: Run tests
      run: ./scripts/run_tests.sh
