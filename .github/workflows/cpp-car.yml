name: C++ car

on:
  pull_request:
  push:
    branches:
      - main

jobs:
  build-docker:
    permissions:
      contents: read
      packages: write

    runs-on: ubuntu-latest

    steps:
    - name: Set up Docker Buildx
      uses: docker/setup-buildx-action@v4

    - name: Login to GitHub Container Registry
      uses: docker/login-action@v4
      with:
        registry: ghcr.io
        username: ${{ github.repository_owner }}
        password: ${{ secrets.GITHUB_TOKEN }}

    - name: Build and push
      uses: docker/build-push-action@v7
      with:
        tags: ghcr.io/ltowarek/dust-mite-cpp-devcontainer
        file: ./.devcontainer/cpp/Dockerfile
        push: true

  build:
    needs: build-docker
    permissions:
      contents: read
      actions: read

    runs-on: ubuntu-latest

    strategy:
      matrix:
        include:
          - name: main
            path: car
          - name: main-all-features
            path: car
            sdkconfig_overlay: sdkconfig.defaults.all
          - name: test-tracing
            path: car/components/tracing/test_apps
          - name: test-camera
            path: car/components/camera/test_apps
          - name: test-motor
            path: car/components/motor/test_apps
          - name: test-telemetry
            path: car/components/telemetry/test_apps
            qemu: true
            sdkconfig_overlay: sdkconfig.defaults.qemu
            pytest_pattern: pytest_telemetry_qemu.py
          - name: test-web_server
            path: car/components/web_server/test_apps
            qemu: true
            sdkconfig_overlay: sdkconfig.defaults.qemu
            pytest_pattern: pytest_web_server_qemu.py

    container:
      image: ghcr.io/ltowarek/dust-mite-cpp-devcontainer
      options: --user root
      credentials:
        username: ${{ github.repository_owner }}
        password: ${{ secrets.GITHUB_TOKEN }}

    defaults:
      run:
        shell: bash

    steps:
    - name: Checkout
      uses: actions/checkout@v4
      with:
        submodules: recursive

    - name: Cache ccache
      uses: actions/cache@v5
      with:
        path: ${{ github.workspace }}/.ccache
        key: ccache-${{ runner.os }}-idf-${{ matrix.path }}-${{ github.run_id }}
        restore-keys: |
          ccache-${{ runner.os }}-idf-${{ matrix.path }}-
          ccache-${{ runner.os }}-idf-

    - name: Build
      env:
        CCACHE_DIR: ${{ github.workspace }}/.ccache
        SDKCONFIG_DEFAULTS: ${{ matrix.sdkconfig_overlay && format('sdkconfig.defaults;{0}', matrix.sdkconfig_overlay) || '' }}
      run: |
        source $IDF_PATH/export.sh
        idf.py build
      working-directory: ${{ matrix.path }}

    - name: Run QEMU tests
      if: matrix.qemu
      run: |
        source $IDF_PATH/export.sh
        pytest ${{ matrix.pytest_pattern }} --embedded-services idf,qemu -v
      working-directory: ${{ matrix.path }}

  clang-format:
    needs: build-docker
    permissions:
      contents: read

    runs-on: ubuntu-latest

    container:
      image: ghcr.io/ltowarek/dust-mite-cpp-devcontainer
      options: --user root
      credentials:
        username: ${{ github.repository_owner }}
        password: ${{ secrets.GITHUB_TOKEN }}

    defaults:
      run:
        shell: bash
        working-directory: ./car

    steps:
    - name: Checkout
      uses: actions/checkout@v4

    - name: Run clang-format
      run: ./scripts/run_clang_format.sh -n --Werror

  clang-tidy:
    needs: build-docker
    permissions:
      contents: read
      actions: read

    runs-on: ubuntu-latest

    container:
      image: ghcr.io/ltowarek/dust-mite-cpp-devcontainer
      options: --user root
      credentials:
        username: ${{ github.repository_owner }}
        password: ${{ secrets.GITHUB_TOKEN }}

    defaults:
      run:
        shell: bash

    steps:
    - name: Checkout
      uses: actions/checkout@v4
      with:
        submodules: recursive

    - name: Cache ccache
      uses: actions/cache@v5
      with:
        path: ${{ github.workspace }}/.ccache
        key: ccache-${{ runner.os }}-idf-clang-tidy-${{ github.run_id }}
        restore-keys: |
          ccache-${{ runner.os }}-idf-clang-tidy-

    # Building with esp-idf's clang toolchain is still experimental
    # (see CONTRIBUTING.md). run_clang_tidy.sh tolerates the known
    # link-step failure on its own; a non-zero exit here means clang-tidy
    # itself failed (tool crash) or surfaced a finding in a check that
    # WarningsAsErrors promotes, not the expected link failure.
    - name: Run clang-tidy
      env:
        CCACHE_DIR: ${{ github.workspace }}/.ccache
      run: ./scripts/run_clang_tidy.sh
      working-directory: car

  ubsan:
    needs: build-docker
    permissions:
      contents: read
      actions: read

    runs-on: ubuntu-latest

    strategy:
      matrix:
        include:
          - name: telemetry
            path: car/components/telemetry/test_apps
            pytest_pattern: pytest_telemetry_qemu.py
          - name: web_server
            path: car/components/web_server/test_apps
            pytest_pattern: pytest_web_server_qemu.py

    container:
      image: ghcr.io/ltowarek/dust-mite-cpp-devcontainer
      options: --user root
      credentials:
        username: ${{ github.repository_owner }}
        password: ${{ secrets.GITHUB_TOKEN }}

    defaults:
      run:
        shell: bash

    steps:
    - name: Checkout
      uses: actions/checkout@v4
      with:
        submodules: recursive

    - name: Cache ccache
      uses: actions/cache@v5
      with:
        path: ${{ github.workspace }}/.ccache
        key: ccache-${{ runner.os }}-idf-ubsan-${{ matrix.name }}-${{ github.run_id }}
        restore-keys: |
          ccache-${{ runner.os }}-idf-ubsan-${{ matrix.name }}-
          ccache-${{ runner.os }}-idf-ubsan-

    - name: Build
      env:
        CCACHE_DIR: ${{ github.workspace }}/.ccache
        SDKCONFIG_DEFAULTS: sdkconfig.defaults;sdkconfig.defaults.qemu;sdkconfig.defaults.ubsan
      run: |
        source $IDF_PATH/export.sh
        idf.py build
      working-directory: ${{ matrix.path }}

    - name: Run QEMU tests
      run: |
        source $IDF_PATH/export.sh
        pytest ${{ matrix.pytest_pattern }} --embedded-services idf,qemu -v
      working-directory: ${{ matrix.path }}

  ci-status-cpp-car:
    needs: [build-docker, build, clang-format, clang-tidy, ubsan]
    if: always()
    runs-on: ubuntu-latest
    steps:
    - name: Fail if any needed job did not succeed
      if: ${{ contains(needs.*.result, 'failure') || contains(needs.*.result, 'cancelled') || contains(needs.*.result, 'skipped') }}
      run: exit 1
