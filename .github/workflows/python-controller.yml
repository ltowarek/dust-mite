name: Python controller

on: 
  pull_request:
  push:
    branches: 
      - main

jobs:
  build-docker:
    permissions:
      contents: read
      packages: write

    runs-on: ubuntu-latest

    steps:
    - name: Set up Docker Buildx
      uses: docker/setup-buildx-action@v4

    - name: Login to GitHub Container Registry
      uses: docker/login-action@v4
      with:
        registry: ghcr.io
        username: ${{ github.repository_owner }}
        password: ${{ secrets.GITHUB_TOKEN }}

    - name: Build and push
      uses: docker/build-push-action@v7
      with:
        tags: ghcr.io/ltowarek/dust-mite-python-devcontainer
        file: ./.devcontainer/python/Dockerfile
        push: true

  run-checks:
    needs: build-docker
    permissions:
      contents: read

    runs-on: ubuntu-latest

    container:
      image: ghcr.io/ltowarek/dust-mite-python-devcontainer
      options: --user root
      credentials:
        username: ${{ github.repository_owner }}
        password: ${{ secrets.GITHUB_TOKEN }}

    defaults:
      run:
        shell: bash
        working-directory: ./controller

    steps:
    - name: Checkout
      uses: actions/checkout@v4

    - name: Activate venv
      run: |
        source /home/vscode/venv/bin/activate
        echo "VIRTUAL_ENV=$VIRTUAL_ENV" >> $GITHUB_ENV
        echo "$VIRTUAL_ENV/bin" >> $GITHUB_PATH

    - name: Install package
      run: pip install --disable-pip-version-check --no-cache-dir -e .

    - name: Run linters
      run: ./scripts/run_linters.sh --output-format=github
    - name: Run formatter
      run: ./scripts/run_formatter.sh --diff
    - name: Run type checks
      run: ./scripts/run_type_checks.sh
    - name: Run requirements checks
      run: ./scripts/run_requirements_checks.sh

    - name: Run tests
      run: ./scripts/run_tests.sh

    # Non-blocking: coverage artifact is informational only.
    - name: Upload coverage artifact
      uses: actions/upload-artifact@v4
      with:
        name: coverage-python
        path: |
          controller/coverage.xml
          controller/coverage/
        if-no-files-found: warn

  ci-status-python-controller:
    needs: [build-docker, run-checks]
    if: always()
    runs-on: ubuntu-latest
    steps:
    - name: Fail if any needed job did not succeed
      if: ${{ contains(needs.*.result, 'failure') || contains(needs.*.result, 'cancelled') || contains(needs.*.result, 'skipped') }}
      run: exit 1
