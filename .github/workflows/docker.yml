name: Docker

on:
  pull_request:
  push:
    branches:
      - main

jobs:
  build-car:
    permissions:
      contents: read
      packages: write

    runs-on: ubuntu-latest

    steps:
    - name: Checkout
      uses: actions/checkout@v4
      with:
        submodules: recursive

    - name: Set up Docker Buildx
      uses: docker/setup-buildx-action@v4

    - name: Login to GitHub Container Registry
      uses: docker/login-action@v4
      with:
        registry: ghcr.io
        username: ${{ github.repository_owner }}
        password: ${{ secrets.GITHUB_TOKEN }}

    - name: Build and push
      uses: docker/build-push-action@v7
      with:
        context: ./car
        push: ${{ github.event_name == 'push' }}
        tags: ghcr.io/ltowarek/dust-mite-car
        cache-from: type=gha
        cache-to: type=gha,mode=max

  build-controller:
    permissions:
      contents: read
      packages: write

    runs-on: ubuntu-latest

    steps:
    - name: Checkout
      uses: actions/checkout@v4

    - name: Set up Docker Buildx
      uses: docker/setup-buildx-action@v4

    - name: Login to GitHub Container Registry
      uses: docker/login-action@v4
      with:
        registry: ghcr.io
        username: ${{ github.repository_owner }}
        password: ${{ secrets.GITHUB_TOKEN }}

    - name: Build and push
      uses: docker/build-push-action@v7
      with:
        context: ./controller
        push: ${{ github.event_name == 'push' }}
        tags: ghcr.io/ltowarek/dust-mite-controller
        cache-from: type=gha
        cache-to: type=gha,mode=max

  build-web:
    permissions:
      contents: read
      packages: write

    runs-on: ubuntu-latest

    steps:
    - name: Checkout
      uses: actions/checkout@v4

    - name: Set up Docker Buildx
      uses: docker/setup-buildx-action@v4

    - name: Login to GitHub Container Registry
      uses: docker/login-action@v4
      with:
        registry: ghcr.io
        username: ${{ github.repository_owner }}
        password: ${{ secrets.GITHUB_TOKEN }}

    - name: Build and push
      uses: docker/build-push-action@v7
      with:
        context: ./web
        push: ${{ github.event_name == 'push' }}
        tags: ghcr.io/ltowarek/dust-mite-web
        cache-from: type=gha
        cache-to: type=gha,mode=max

  ci-status-docker:
    needs: [build-car, build-controller, build-web]
    if: always()
    runs-on: ubuntu-latest
    steps:
    - name: Fail if any needed job did not succeed
      if: ${{ contains(needs.*.result, 'failure') || contains(needs.*.result, 'cancelled') || contains(needs.*.result, 'skipped') }}
      run: exit 1
