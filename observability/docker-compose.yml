networks:
  dust-mite-observability:
    name: dust-mite-observability

services:
  jaeger:
    image: cr.jaegertracing.io/jaegertracing/jaeger:2.16.0
    ports:
      - "16686:16686"   # Jaeger UI
      - "4317:4317"     # OTLP gRPC
      - "4318:4318"     # OTLP HTTP
      - "5778:5778"     # Serve configurations
      - "9411:9411"     # Zipkin collector
    volumes:
      - ./config.yml:/config.yml:ro
    command:
      - --config=/config.yml
    networks:
      - dust-mite-observability
